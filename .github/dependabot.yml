version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      tauri:
        patterns:
          - '@tauri-apps/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
