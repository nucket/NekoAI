name: Metrics

on:
  schedule:
    - cron: '17 6 * * *' # 06:17 UTC daily
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run parser tests
        run: node --test scripts/metrics/parse-asset.test.mjs

      - name: Collect snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/metrics/collect.mjs

      - name: Commit changes if any
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/metrics/
          if git diff --cached --quiet; then
            echo 'No metrics changes to commit.'
            exit 0
          fi
          git commit -m "chore(metrics): refresh install snapshot"
          git push
